<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>
  <!-- AI Brain Circuit -->
  <circle cx="256" cy="220" r="90" fill="none" stroke="white" stroke-width="8" opacity="0.9"/>
  <circle cx="256" cy="220" r="50" fill="none" stroke="white" stroke-width="6" opacity="0.6"/>
  <!-- Neural nodes -->
  <circle cx="256" cy="130" r="10" fill="white"/>
  <circle cx="330" cy="180" r="10" fill="white"/>
  <circle cx="330" cy="260" r="10" fill="white"/>
  <circle cx="256" cy="310" r="10" fill="white"/>
  <circle cx="182" cy="260" r="10" fill="white"/>
  <circle cx="182" cy="180" r="10" fill="white"/>
  <!-- Inner nodes -->
  <circle cx="256" cy="170" r="7" fill="white" opacity="0.8"/>
  <circle cx="290" cy="200" r="7" fill="white" opacity="0.8"/>
  <circle cx="290" cy="240" r="7" fill="white" opacity="0.8"/>
  <circle cx="256" cy="270" r="7" fill="white" opacity="0.8"/>
  <circle cx="222" cy="240" r="7" fill="white" opacity="0.8"/>
  <circle cx="222" cy="200" r="7" fill="white" opacity="0.8"/>
  <!-- Center dot -->
  <circle cx="256" cy="220" r="14" fill="white"/>
  <!-- Connection lines -->
  <line x1="256" y1="170" x2="290" y2="200" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="290" y1="200" x2="290" y2="240" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="290" y1="240" x2="256" y2="270" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="270" x2="222" y2="240" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="222" y1="240" x2="222" y2="200" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="222" y1="200" x2="256" y2="170" stroke="white" stroke-width="3" opacity="0.5"/>
  <!-- Cross connections -->
  <line x1="256" y1="170" x2="256" y2="220" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="290" y1="200" x2="256" y2="220" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="290" y1="240" x2="256" y2="220" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="222" y1="200" x2="256" y2="220" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="222" y1="240" x2="256" y2="220" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="270" x2="256" y2="220" stroke="white" stroke-width="2" opacity="0.4"/>
  <!-- Text "PRO" -->
  <text x="256" y="400" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="72" fill="white" letter-spacing="12">PRO</text>
</svg>
