<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Agent Pro - تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --card: rgba(10, 10, 10, 0.65);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #FFFFFF;
      --text2: #D4D4D4;
      --text3: #A3A3A3;
      --accent: #FFFFFF;
      --green: #10B981;
      --red: #EF4444;
      --blue: #3B82F6;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .login-page {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .login-brand-panel {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      z-index: 10;
      background: rgba(0,0,0,0.3);
      border-left: 1px solid rgba(255,255,255,0.05);
    }

    .login-form-panel {
      width: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      z-index: 10;
      background: var(--bg);
      box-shadow: -20px 0 60px rgba(0,0,0,0.5);
    }

    .bg-animation {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: linear-gradient(135deg, #0a0a0a, #111, #000);
      overflow: hidden;
    }

    .bg-animation::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: conic-gradient(
        from 0deg at 50% 50%,
        rgba(59,130,246,0.08) 0deg,
        transparent 60deg,
        rgba(99,102,241,0.06) 120deg,
        transparent 180deg,
        rgba(16,185,129,0.06) 240deg,
        transparent 300deg,
        rgba(59,130,246,0.08) 360deg
      );
      animation: bgSpin 25s linear infinite;
    }

    .bg-animation::after {
      content: '';
      position: absolute;
      width: 150%;
      height: 150%;
      top: -25%;
      left: -25%;
      background: radial-gradient(ellipse at 30% 40%, rgba(99,102,241,0.12) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 60%, rgba(16,185,129,0.1) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 80%, rgba(236,72,153,0.08) 0%, transparent 40%);
      animation: bgFloat 18s ease-in-out infinite alternate;
    }

    @keyframes bgSpin { to { transform: rotate(360deg); } }
    @keyframes bgFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-5%, 3%) scale(1.05); }
    }

    .particles {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      animation: cardEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardEntry {
      from { opacity: 0; transform: translateX(-40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .login-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(99,102,241,0.2));
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(99,102,241,0.15);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(99,102,241,0.15); }
      50% { box-shadow: 0 0 60px rgba(99,102,241,0.25); }
    }

    .login-logo svg {
      width: 32px;
      height: 32px;
      color: #818CF8;
    }

    .login-title {
      text-align: center;
      font-size: 42px;
      font-weight: 900;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff, #a3a3a3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .login-subtitle {
      text-align: center;
      font-size: 18px;
      color: var(--text2);
      margin-bottom: 36px;
      line-height: 1.8;
      max-width: 400px;
    }

    .form-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 24px;
      text-align: center;
    }

    .social-btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 14px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .social-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.03));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .social-btn:hover {
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    .social-btn:hover::before { opacity: 1; }

    .social-btn:active { transform: translateY(0); }

    .social-btn.google:hover { border-color: rgba(66,133,244,0.4); box-shadow: 0 8px 25px rgba(66,133,244,0.1); }
    .social-btn.apple:hover { border-color: rgba(255,255,255,0.2); }
    .social-btn.guest:hover { border-color: rgba(16,185,129,0.4); box-shadow: 0 8px 25px rgba(16,185,129,0.1); }

    .social-btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: var(--text3);
      font-size: 13px;
      font-weight: 500;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--card-border);
    }

    .login-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .login-input:focus {
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }

    .login-input::placeholder { color: var(--text3); }

    .login-submit {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: #FFFFFF;
      color: #000000;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(255,255,255,0.1);
    }

    .login-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,255,255,0.15);
      background: #f0f0f0;
    }

    .login-submit:active { transform: translateY(0); }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text3);
    }

    .login-footer a {
      color: #818CF8;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .login-footer a:hover { color: #A5B4FC; }

    .login-terms {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: rgba(163,163,163,0.6);
      line-height: 1.6;
    }

    .login-terms a {
      color: rgba(163,163,163,0.8);
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      .login-page { flex-direction: column; }
      .login-brand-panel { display: none; } /* Hide the big side panel on mobile */
      .login-form-panel { width: 100%; box-shadow: none; background: transparent; }
      .login-card {
        background: var(--card);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 1px solid var(--card-border);
        border-radius: 24px;
        padding: 48px 24px;
        box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      }
      .bg-animation { display: block; }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="bg-animation"></div>
    <div class="particles" id="particles"></div>

    <div class="login-brand-panel">
      <div class="login-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 40px; height: 40px; color:#818CF8;"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
      </div>
      <h1 class="login-title">AI Agent Pro</h1>
      <p class="login-subtitle">أقوى منصة للذكاء الاصطناعي.<br>ارفع مستوى إنتاجيتك واكتب الأكواد باحترافية وسرعة مذهلة.</p>
    </div>

    <div class="login-form-panel">
      <div class="login-card">
        <h2 class="form-title">مرحباً بك مجدداً</h2>

      <button class="social-btn google" onclick="loginWith('google')">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        المتابعة مع Google
      </button>

      <button class="social-btn apple" onclick="loginWith('apple')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        المتابعة مع Apple
      </button>

      <button class="social-btn guest" onclick="loginWith('guest')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        الدخول كزائر
      </button>

      <div class="divider">أو سجّل بالبريد الإلكتروني</div>

      <input type="email" class="login-input" placeholder="البريد الإلكتروني" id="login-email">
      <input type="password" class="login-input" placeholder="كلمة المرور" id="login-password">
      <button class="login-submit" onclick="loginWith('email')">تسجيل الدخول</button>

      <div class="login-footer">
        ليس لديك حساب؟ <a href="#">إنشاء حساب جديد</a>
      </div>

      <div class="login-terms">
        بتسجيل الدخول، أنت توافق على <a href="#">شروط الاستخدام</a> و<a href="#">سياسة الخصوصية</a>
      </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var container = document.getElementById('particles');
      for (var i = 0; i < 40; i++) {
        var p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (6 + Math.random() * 12) + 's';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
        container.appendChild(p);
      }
    })();

    function loginWith(method) {
      var card = document.querySelector('.login-card');
      card.style.transition = 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
      card.style.opacity = '0';
      card.style.transform = 'translateY(-20px) scale(0.95)';

      setTimeout(function() {
        if (method === 'guest') {
          localStorage.setItem('ai_user', JSON.stringify({type: 'guest', name: 'زائر', avatar: 'Z'}));
        } else if (method === 'google') {
          localStorage.setItem('ai_user', JSON.stringify({type: 'google', name: 'Ahmed', avatar: 'A'}));
        } else if (method === 'apple') {
          localStorage.setItem('ai_user', JSON.stringify({type: 'apple', name: 'User', avatar: 'A'}));
        } else {
          var email = document.getElementById('login-email').value || 'user@ai.com';
          localStorage.setItem('ai_user', JSON.stringify({type: 'email', name: email.split('@')[0], avatar: email[0].toUpperCase()}));
        }
        localStorage.setItem('ai_logged_in', 'true');
        window.location.href = 'index.html';
      }, 500);
    }

    if (localStorage.getItem('ai_logged_in') === 'true') {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
